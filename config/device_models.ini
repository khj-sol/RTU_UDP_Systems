# ============================================================================
# Device Models Configuration
# Version: 2.0.0
# Description: Device type and model definitions for RTU system
# ============================================================================

# ----------------------------------------------------------------------------
# Device Types
# ----------------------------------------------------------------------------
[device_types]
# type_id = description
0 = RTU
1 = Inverter
2 = Environment Sensor
3 = Power Meter
4 = Protection Relay
5 = Weather Station

# ----------------------------------------------------------------------------
# RTU Models
# ----------------------------------------------------------------------------
[rtu_models]
# model_id = model_name
0 = SRPV-RTU-KR
1 = SRPV-ZEE-KR

# ----------------------------------------------------------------------------
# Inverter Models
# ----------------------------------------------------------------------------
[inverter_models]
# model_id = model_name  (common/ 레지스터 파일 기준)
1 = Solarize 50K
2 = Huawei 50K
3 = Kstar 60K
4 = Sungrow 50K
5 = Ekos 10K
6 = Senergy 50K
7 = Growatt 10K
8 = CPS 50K
9 = Sofar 50K
10 = Solis 50K
11 = Sunways 30K

# Inverter Features: iv_scan_support, der_avm_support, string_current_monitor, iv_data_points
# IV 스캔 판정: CMD + Status + Data 레지스터 3가지 모두 있어야 지원
[inverter_features]
# model_id = iv_scan, der_avm, string_current_monitor, iv_data_points
1  = true,  true,  true,  64     ; Solarize 50K (CMD/Status=0x600D, Data=0x8000~)
2  = false, false, false, 0      ; Huawei 50K (IV 미지원)
3  = true,  true,  false, 100    ; Kstar 60K (CMD=0x0FC3, Status=0x0C36, Data=0x1388~)
4  = false, true,  true,  0      ; Sungrow 50K
5  = false, true,  true,  0      ; Ekos 10K
6  = true,  true,  true,  64     ; Senergy 50K (CMD/Status=0x600D, Data=0x8000~)
7  = false, true,  false, 0      ; Growatt 10K
8  = false, true,  false, 0      ; CPS 50K
9  = false, true,  false, 0      ; Sofar 50K
10 = false, true,  true,  0      ; Solis 50K (PV1~16 Current = String Current)
11 = false, true,  true,  0      ; Sunways 30K

# Inverter Protocol
[inverter_protocols]
# model_id = protocol_name  (common/{protocol}_*_registers.py 매칭)
1  = solarize
2  = huawei
3  = kstar
4  = sungrow
5  = ekos
6  = senergy
7  = growatt
8  = cps
9  = sofar
10 = solis
11 = sunways

# ----------------------------------------------------------------------------
# Protection Relay Models
# ----------------------------------------------------------------------------
[relay_models]
# model_id = model_name
1 = KDU-300
2 = VIPAM3500C-DG

# Relay Protocol
[relay_protocols]
# model_id = protocol_name
1 = relay
2 = vipam

# ----------------------------------------------------------------------------
# Weather Station Models
# ----------------------------------------------------------------------------
[weather_models]
# model_id = model_name
1 = SEM5046

# Weather Protocol
[weather_protocols]
# model_id = protocol_name
1 = weather
