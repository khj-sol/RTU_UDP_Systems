# ----------------------------------------------------------------------------
# Device Types
# ----------------------------------------------------------------------------
[device_types]
# type_id = description
0 = RTU
1 = Inverter
2 = Environment Sensor
3 = Power Meter
4 = Protection Relay
5 = Weather Station

# ----------------------------------------------------------------------------
# RTU Models
# ----------------------------------------------------------------------------
[rtu_models]
# model_id = model_name
0 = SRPV-RTU-KR
1 = SRPV-ZEE-KR

# ----------------------------------------------------------------------------
# Inverter Models
# ----------------------------------------------------------------------------
[inverter_models]
# model_id = model_name  (protocol_constants.py INV_MODEL_* 와 일치)
1  = Solarize
2  = Huawei
3  = Kstar
4  = Solarize 50K
5  = Huawei 50K
6  = Kstar 60K
7  = Sungrow
8  = EKOS
9  = Solarize VK
10 = Senergy
11 = GoodWe

