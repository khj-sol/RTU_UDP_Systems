# ============================================================================
# Device Models Configuration
# Version: 2.0.0
# Description: Device type and model definitions for RTU system
# ============================================================================

# ----------------------------------------------------------------------------
# Device Types
# ----------------------------------------------------------------------------
[device_types]
# type_id = description
0 = RTU
1 = Inverter
2 = Environment Sensor
3 = Power Meter
4 = Protection Relay
5 = Weather Station

# ----------------------------------------------------------------------------
# RTU Models
# ----------------------------------------------------------------------------
[rtu_models]
# model_id = model_name
0 = SRPV-RTU-KR
1 = SRPV-ZEE-KR

# ----------------------------------------------------------------------------
# Inverter Models
# ----------------------------------------------------------------------------
[inverter_models]
# model_id = model_name  (protocol_constants.py INV_MODEL_* 와 일치)
1 = Solarize 50K
2 = Huawei 50K
3 = Kstar 60K
4 = Sungrow

# Inverter Features: iv_scan_support, der_avm_support, string_current_monitor
[inverter_features]
# model_id = iv_scan, der_avm, string_current_monitor
1 = true,  true,  true    ; Solarize 50K
2 = false, false, false   ; Huawei 50K — String 전류 레지스터 없음
3 = true,  true,  true    ; Kstar 60K
4 = false, true,  true    ; Sungrow

# Inverter Protocol
[inverter_protocols]
# model_id = protocol_name
1 = solarize
2 = huawei
3 = kstar
4 = sungrow

# ----------------------------------------------------------------------------
# Protection Relay Models
# ----------------------------------------------------------------------------
[relay_models]
# model_id = model_name
1 = KDU-300
2 = VIPAM3500C-DG

# Relay Protocol
[relay_protocols]
# model_id = protocol_name
1 = relay
2 = vipam

# ----------------------------------------------------------------------------
# Weather Station Models
# ----------------------------------------------------------------------------
[weather_models]
# model_id = model_name
1 = SEM5046

# Weather Protocol
[weather_protocols]
# model_id = protocol_name
1 = weather
