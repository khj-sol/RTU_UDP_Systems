[inverter_features]
# model_id = iv_scan, der_avm, string_current_monitor
1  = true,  true,  true    ; Solarize
2  = false, false, false   ; Huawei — String 전류 레지스터 없음
3  = true,  true,  true    ; Kstar
4  = true,  true,  true    ; Solarize 50K
5  = false, false, false   ; Huawei 50K
6  = true,  true,  true    ; Kstar 60K
7  = false, true,  true    ; Sungrow
8  = false, true,  true    ; EKOS
9  = true,  true,  true    ; Solarize VK
10 = true,  true,  true    ; Senergy
11 = false, true,  true    ; GoodWe

