[claude_api]
api_key = YOUR_ANTHROPIC_API_KEY_HERE
model = claude-sonnet-4-6

[ollama]
host = http://localhost:11434
model = gemma4:26b

[phi]
model_path = C:/models/Phi-4-mini-instruct
device = auto
enabled = true

[qwen_vl]
model_path = C:/models/Qwen3-VL-32B-4bit
device = auto
enabled = true
; WSL 추론 서버 URL — 설정 시 Windows에서 모델 로드 없이 WSL 서버로 위임
; WSL 서버 시작: model_maker_web_v4/wsl_server/start_server.sh
wsl_server_url = http://localhost:8084
image_dpi = 200
sparse_threshold = 3
