# RTU Configuration File V1.0.0
# UDP Protocol V2.0.11

# =============================================================================
# System Settings
# =============================================================================
[SYSTEM]
# Log level: DEBUG, INFO, WARNING, ERROR, CRITICAL
log_level = INFO

# =============================================================================
# RTU Device Settings
# =============================================================================
[RTU]
# RTU unique identifier
rtu_id = 10000001

# UDP local port
local_port = 9100

# Data transmission interval in seconds
communication_period = 5

# =============================================================================
# Server Configuration
# =============================================================================
[SERVER]
# Server mode: primary / secondary / dual
mode = primary

# Primary server
primary_host = 127.0.0.1
primary_port = 13142

# Secondary server (used when mode = dual or secondary)
secondary_host = dunaj.myds.me
secondary_port = 13132

# =============================================================================
# RS485 Hardware Settings
# =============================================================================
[RS485]
# RS485 mode: auto / cm4_serial / hat_spi / serial
# auto       = Auto-detect platform (recommended)
# cm4_serial = CM4 native UART
# hat_spi    = Waveshare 2-CH RS485 HAT
# serial     = PC USB-RS485 adapter
mode = auto

# CM4 serial port mapping
master_port = /dev/ttyAMA3
slave_port = /dev/ttyAMA4

# PC USB-RS485 adapter COM port
serial_port = COM3

# Default baudrate
baudrate = 9600

# =============================================================================
# DER-AVM Communication Settings
# =============================================================================
[DER_AVM]
# Enable DER-AVM communication (true/false)
enabled = false

# Number of inverters managed by DER-AVM (1-10)
inverter_count = 1

# Modbus slave ID
slave_id = 1

# RS485 baudrate
baudrate = 9600

# RS485 channel (1 or 2)
channel = 2

# Simulation mode
simulation = false
